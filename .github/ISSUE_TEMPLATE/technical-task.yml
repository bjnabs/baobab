name: Technical Task
description: Create an engineering implementation task for a User Story.
title: "[TECH]: "
labels:
  - technical-task

body:

  - type: markdown
    attributes:
      value: |
        # Technical Task

        A Technical Task represents a specific engineering activity required to implement a User Story.

        Every Technical Task should be linked to a User Story.

  - type: input
    id: story_reference
    attributes:
      label: User Story Reference
      description: Enter the User Story Issue Number.
      placeholder: "#42"
    validations:
      required: true

  - type: input
    id: task_title
    attributes:
      label: Technical Task Title
      placeholder: Implement JWT authentication endpoint
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the engineering objective.
      placeholder: Explain what this task will implement.
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: Work Type
      options:
        - Backend
        - Frontend
        - Full Stack
        - API
        - Database
        - Infrastructure
        - DevOps
        - Security
        - AI
        - Documentation
        - Testing
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Authentication
        - Tenant Management
        - Users
        - CMS
        - Commerce
        - Finance
        - Analytics
        - Notifications
        - Reporting
        - Core Platform
        - Shared Libraries
        - Infrastructure
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - XS
        - S
        - M
        - L
        - XL
    validations:
      required: true

  - type: input
    id: adr_reference
    attributes:
      label: ADR Reference
      description: Enter an ADR if this task is governed by one.
      placeholder: ADR-0003

  - type: textarea
    id: implementation_details
    attributes:
      label: Implementation Details
      description: Describe how the work should be carried out.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define the engineering acceptance criteria.
      placeholder: |
        • Criterion 1
        • Criterion 2
        • Criterion 3
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List related Technical Tasks, Stories, ADRs or external dependencies.

  - type: checkboxes
    id: engineering_considerations
    attributes:
      label: Engineering Considerations
      options:
        - label: Database migration required
        - label: API contract changes
        - label: Multi-tenant impact
        - label: Security review required
        - label: Performance optimisation required
        - label: Caching changes required
        - label: Infrastructure changes required
        - label: Feature flag required

  - type: checkboxes
    id: testing_requirements
    attributes:
      label: Testing Requirements
      options:
        - label: Unit Tests
        - label: Integration Tests
        - label: End-to-End Tests
        - label: Performance Tests
        - label: Security Tests
        - label: Manual Testing

  - type: checkboxes
    id: documentation
    attributes:
      label: Documentation Updates
      options:
        - label: README
        - label: API Documentation
        - label: Architecture Documentation
        - label: User Guide
        - label: ADR Update Required
        - label: No documentation changes required

  - type: checkboxes
    id: definition_of_done
    attributes:
      label: Definition of Done Checklist
      options:
        - label: Code implemented
        - label: Coding standards followed
        - label: Tests passing
        - label: Code reviewed
        - label: Documentation updated
        - label: CI pipeline passed
        - label: Ready for merge

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Include references, implementation guidance or supporting information.
