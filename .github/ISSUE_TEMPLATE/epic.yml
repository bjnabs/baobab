name: Epic
description: Track a large body of work consisting of multiple related issues.
title: "[Epic]: "
labels:
  - epic
body:

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the Epic.
      placeholder: Describe the overall objective.

    validations:
      required: true

  - type: textarea
    id: business-value
    attributes:
      label: Business Value
      description: Why is this Epic important?

    validations:
      required: true

  - type: textarea
    id: objectives
    attributes:
      label: Objectives
      description: List the primary objectives.

    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included?

    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What is explicitly excluded?

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: Expected outputs.

    validations:
      required: true

  - type: textarea
    id: child-issues
    attributes:
      label: Child Issues
      description: Link all related issues here.

  - type: textarea
    id: acceptance
    attributes:
      label: Success Criteria
      description: What must be true for this Epic to be complete?

    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks & Dependencies

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
