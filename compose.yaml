# ==============================================================================
# BAOBAB Enterprise Platform
# Docker Compose Configuration
#
# Purpose:
#   Defines the local development platform for BAOBAB.
#
# Scope:
#   - Platform Services
#   - Business Services
#
# Production orchestration is handled by Kubernetes.
# ==============================================================================

name: baobab

networks:
  frontend:
    driver: bridge

  backend:
    driver: bridge

volumes:
  db_data:
  redis_data:
  mailpit_data:

services:

  ###########################################################################
  # Platform Services
  ###########################################################################

  nginx:
    image: nginx:alpine
    restart: unless-stopped

    env_file:
      - .env

    networks:
      - frontend

    ports:
      - "${NGINX_HTTP_PORT:-80}:80"

  db:
    image: postgres:17
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - backend

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    command: redis-server --appendonly yes

    env_file:
      - .env

    volumes:
      - redis_data:/data

    networks:
      - backend

    ports:
      - "${REDIS_PORT:-6379}:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - mailpit_data:/data

    networks:
      - backend

    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  ###########################################################################
  # Business Services (Placeholders)
  ###########################################################################

  backend:
    image: alpine:latest
    command: sleep infinity

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - frontend
      - backend

  ai:
    image: alpine:latest
    command: sleep infinity

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - frontend
      - backend

  frontend:
    image: alpine:latest
    command: sleep infinity

    env_file:
      - .env

    networks:
      - frontend

  worker:
    image: alpine:latest
    command: sleep infinity

    env_file:
      - .env

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

    networks:
      - backend
